image: node:20

stages:
  - lint
  - build
  - deploy

cache:
  key: $CI_COMMIT_REF_SLUG
  paths:
    - node_modules/

lint:
  stage: lint
  script:
    - npm ci
    - npm run lint
  only:
    - merge_requests
    - main

pages:
  stage: deploy
  script:
    - npm ci
    - npm run build
    - cp -r out/ public/
    - bash scripts/check-site.sh public/
  artifacts:
    paths:
      - public/
  only:
    - main
