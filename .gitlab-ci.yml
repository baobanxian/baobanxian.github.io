image: node:20

stages:
  - lint
  - build
  - deploy

cache:
  key:
    files:
      - package-lock.json
    prefix: $CI_COMMIT_REF_SLUG
  paths:
    - node_modules/
    - .next/cache/

lint:
  stage: lint
  script:
    - npm ci
    - npm run lint
  only:
    - merge_requests
    - main

build:
  stage: build
  script:
    - npm ci
    - npm run generate
    - npm run generate-wiki
    - npx next build
  artifacts:
    paths:
      - out/
    expire_in: 1 hour
  only:
    - main

pages:
  stage: deploy
  script:
    - cp -r out/ public/
    - bash scripts/check-site.sh public/
  artifacts:
    paths:
      - public/
  only:
    - main

deploy-github:
  stage: deploy
  script:
    - git clone --depth 1 https://baobanxian:${GITHUB_TOKEN}@github.com/baobanxian/baobanxian.github.io.git gh-pages
    - rm -rf gh-pages/*
    - cp -r out/. gh-pages/
    - touch gh-pages/.nojekyll
    - cd gh-pages
    - git config user.name "baobanxian"
    - git config user.email "2793406287@qq.com"
    - git add .
    - git diff --quiet && git diff --staged --quiet || git commit -m "Deploy $(date '+%Y-%m-%d %H:%M:%S')"
    - git push origin main
  only:
    - main
